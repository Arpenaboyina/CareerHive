name: CI/CD

# Build, test and deploy CareerHive.
# - CI runs on every push and pull request.
# - Deploy to GitHub Pages runs only on pushes to the default branch.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ----------------------------------------------------------------
  # Continuous Integration: install, lint-via-build, test, artifact
  # ----------------------------------------------------------------
  build-and-test:
    name: Build & Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Production build (warnings fail the build)
        env:
          CI: true
        run: npm run build

      - name: Run tests
        env:
          CI: true
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Upload build artifact
        if: matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build
          retention-days: 7

  # ----------------------------------------------------------------
  # Continuous Deployment: publish to GitHub Pages on main/master
  # ----------------------------------------------------------------
  deploy:
    name: Deploy to GitHub Pages
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          # Automatically enable GitHub Pages for the repo on first run.
          enablement: true

      - name: Build for GitHub Pages
        env:
          CI: true
          # Serve assets from the repository sub-path on project Pages.
          PUBLIC_URL: ${{ steps.pages.outputs.base_path }}
        run: npm run build

      - name: Add SPA fallback (404 -> index.html)
        run: cp build/index.html build/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
